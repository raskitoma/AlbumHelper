version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: album-helper
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - "${DB_DIR:-./data}:/app/data"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/figuritas.db
    restart: always
